apiVersion: v1
kind: ConfigMap
metadata:
  name: udp-services
  namespace: ingress-nginx
data:

  # UDP Port 1700 ChirpStack-v3
  1700: "chirpstack-v3/chirpstack-v3-gateway-bridge-service:1700"

  # UDP Port 1710 ChirpStack-v4
  1710: "chirpstack-v4/chirpstack-v4-gateway-bridge-service:1710"

  # UDP Port 1700 OCI-DevOps
  #1700: "oci-devops/udp-1700-app-service:1700"

  # UDP Port 1710 OCI-DevOps
  #1710: "oci-devops/udp-1710-app-service:1710"

