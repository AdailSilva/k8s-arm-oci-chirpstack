#####################
# Attached with OCI #
#####################

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: oci-fss-postgresql-claim0-chirpstack-v3
  # namespace: chirpstack-v3
  labels:
    app: oci-fss-postgresql-claim0-chirpstack-v3
provisioner: oracle.com/oci-fss
parameters:
  mntTargetId: cid1.mounttarget.oc1.sa_saopaulo_1.aaaaaa4np2xizkpzm5zhkllqojxwiottmewxgylpobqxk3dpfuys2ylefuyqaaaa

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: oci-fss-pv-postgresql-claim0-chirpstack-v3
  # namespace: chirpstack-v3
  labels:
    app: oci-fss-pv-postgresql-claim0-chirpstack-v3
spec:
  storageClassName: oci-fss-postgresql-claim0-chirpstack-v3
  capacity:
    storage: 100Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  mountOptions:
    - nosuid
    - vers=3
    #- vers=4
  nfs:
    server: 10.0.0.143
    path: "/FileSystem-K8S/docker-entrypoint-initdb.d"
    readOnly: false
  persistentVolumeReclaimPolicy: Retain #Retain #Delete

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oci-fss-pvc-postgresql-claim0-chirpstack-v3
  namespace: chirpstack-v3
  labels:
    app: oci-fss-pvc-postgresql-claim0-chirpstack-v3
spec:
  storageClassName: oci-fss-postgresql-claim0-chirpstack-v3
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Mi
  volumeName: oci-fss-pv-postgresql-claim0-chirpstack-v3