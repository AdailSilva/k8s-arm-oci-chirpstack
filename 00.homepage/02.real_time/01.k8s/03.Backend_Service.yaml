
---

apiVersion: v1
kind: Service
metadata:
  name: k8s-dashboard-backend-service
  namespace: k8s-dashboard
  labels:
    app: k8s-dashboard-backend
spec:
  selector:
    app: k8s-dashboard-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
